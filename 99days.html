<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Unity WebGL Player | 99Days</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/bubbls/99itf@main/style.css">
  <style>
    canvas:focus {
      outline: none;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -khtml-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
    }

    #loading-cover {
      display: none;
    }

    #ad-container {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: min(728px, calc(100% - 20px));
      height: 90px;
      background: rgba(0, 0, 0, 0.9);
      display: none;
      z-index: 99999;
      border-radius: 0;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.45);
      box-sizing: border-box;
      transition: transform 0.5s ease-in-out;
    }

    #ad-container.hidden {
      transform: translate(-50%, -100%);
    }

    #ad-iframe {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 745px;
      height: 90px;
      border: 0;
      display: block;
      overflow: hidden;
      pointer-events: auto;
      box-sizing: content-box;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    #ad-iframe::-webkit-scrollbar {
      display: none;
      width: 0;
      height: 0;
    }

    #close-ad {
      position: absolute;
      top: 6px;
      right: 8px;
      background: #ff4d4d;
      color: #fff;
      border: none;
      padding: 5px 9px;
      font-size: 13px;
      border-radius: 4px;
      cursor: not-allowed;
      opacity: 0.72;
      z-index: 100000;
      display: flex;
      align-items: center;
    }

    #close-ad.enabled {
      cursor: pointer;
      opacity: 1;
    }

    #close-ad::before {
      content: "\2191";
      margin-right: 4px;
    }

    #ad-right-mask {
      position: absolute;
      top: 0;
      right: 0;
      width: 12px;
      height: 100%;
      pointer-events: none;
      background: linear-gradient(to right, rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.9));
      z-index: 99999;
    }

    @media (max-width: 440px) {
      #ad-container {
        width: calc(100% - 12px);
      }

      #ad-iframe {
        width: 708px;
      }
    }
  </style>
</head>
<body class="dark">
  <div id="unity-container" class="unity-desktop">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
  </div>

  <div id="loading-cover">
    <div id="unity-loading-bar">
      <div id="unity-progress-bar-empty" style="display: none;">
        <div id="unity-progress-bar-full"></div>
      </div>
      <div class="spinner"></div>
    </div>
  </div>

  <div id="ad-container" aria-hidden="true" role="dialog" aria-label="Advertisement">
    <iframe
      id="ad-iframe"
      src="about:blank"
      data-src=""
      width="768"
      height="95"
      scrolling="no"
      frameborder="0"
      sandbox="allow-scripts allow-popups allow-same-origin"
    ></iframe>
    <button id="close-ad" type="button" disabled>Close (12)</button>
    <div id="ad-right-mask"></div>
  </div>

  <script>
    const buildUrl = "https://cdn.jsdelivr.net/gh/bubbls/99itf@main/Build";
    const loaderUrl = buildUrl + "/Build.loader.js";
    const cdnBaseUrl = "https://cdn.jsdelivr.net/gh/bubbls/99itf@main/";
    const dataParts = [
      cdnBaseUrl + "Build.data.br.part0",
      cdnBaseUrl + "Build.data.br.part1",
      cdnBaseUrl + "Build.data.br.part2",
      cdnBaseUrl + "Build.data.br.part3"
    ];
    const wasmParts = [
      cdnBaseUrl + "Build.wasm.br.part0",
      cdnBaseUrl + "Build.wasm.br.part1",
      cdnBaseUrl + "Build.wasm.br.part2",
      cdnBaseUrl + "Build.wasm.br.part3",
      cdnBaseUrl + "Build.wasm.br.part4"
    ];

    const config = {
      dataUrl: "",
      frameworkUrl: buildUrl + "/Build.framework.js",
      codeUrl: "",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "99Days",
      productVersion: "0.1"
    };

    const container = document.getElementById("unity-container");
    const canvas = document.getElementById("unity-canvas");
    const loadingCover = document.getElementById("loading-cover");
    const progressBarEmpty = document.getElementById("unity-progress-bar-empty");
    const progressBarFull = document.getElementById("unity-progress-bar-full");
    const spinner = document.querySelector(".spinner");

    window.StartUnityInstance = null;
    window.myGameInstance = null;
    window.ysdk = null;
    window.environmentData = {
      language: "en",
      domain: "default_domain",
      deviceType: "desktop",
      isMobile: false,
      isDesktop: true,
      isTablet: false,
      isTV: false,
      appID: "default_app_id",
      browserLang: navigator.language || "en",
      payload: null,
      promptCanShow: false,
      reviewCanShow: false,
      platform: navigator.platform,
      browser: (function () {
        const userAgent = navigator.userAgent;
        if (userAgent.includes("YaBrowser")) return "Yandex";
        if (userAgent.includes("OPR") || userAgent.includes("Opera")) return "Opera";
        if (userAgent.includes("Firefox")) return "Firefox";
        if (userAgent.includes("MSIE") || userAgent.includes("Trident")) return "IE";
        if (userAgent.includes("Edg")) return "Edge";
        if (userAgent.includes("Chrome")) return "Chrome";
        if (userAgent.includes("Safari")) return "Safari";
        return "Other";
      })()
    };
    window.cloudSaves = "noData";
    window.paymentsData = "none";
    window.playerData = "noData";
    window.player = null;
    window.payments = null;
    window.initGame = false;
    window.nowFullAdOpen = false;

    function fetchAndCombineParts(partUrls) {
      return Promise.all(
        partUrls.map(async (url) => {
          const response = await fetch(url);
          if (!response.ok) {
            throw new Error("Failed to fetch " + url);
          }
          return response.arrayBuffer();
        })
      ).then((buffers) => {
        const totalLength = buffers.reduce((sum, buffer) => sum + buffer.byteLength, 0);
        const combined = new Uint8Array(totalLength);
        let offset = 0;

        for (const buffer of buffers) {
          combined.set(new Uint8Array(buffer), offset);
          offset += buffer.byteLength;
        }

        return new Blob([combined], { type: "application/octet-stream" });
      });
    }

    function focusGame() {
      window.focus();
      canvas.focus();
    }

    function auth() {
      return initPlayer();
    }

    function initPlayer() {
      console.warn("initPlayer is not implemented");
      return Promise.resolve("noData");
    }

    function GetPayments() {
      console.warn("GetPayments is not implemented");
      return Promise.resolve("none");
    }

    function SaveCloud() {
      console.warn("SaveCloud is not implemented");
    }

    function LoadCloud() {
      console.warn("LoadCloud is not implemented");
      return Promise.resolve("noData");
    }

    function InitLeaderboard() {
      console.warn("InitLeaderboard is not implemented");
      return Promise.resolve("noData");
    }

    function StickyAdActivity() {
      console.warn("StickyAdActivity is not implemented");
    }

    function Review() {
      console.warn("Review is not implemented");
    }

    function PromptShow() {
      console.warn("PromptShow is not implemented");
    }

    function InitLeaderboards() {
      console.warn("InitLeaderboards is not implemented");
    }

    function GetLeaderboardScores() {
      console.warn("GetLeaderboardScores is not implemented");
    }

    function SetLeaderboardScores() {
      console.warn("SetLeaderboardScores is not implemented");
    }

    function ConsumePurchase() {
      console.warn("ConsumePurchase is not implemented");
    }

    function ConsumePurchases() {
      console.warn("ConsumePurchases is not implemented");
    }

    function InitGame() {
      try {
        console.log("Init Game Success");
        window.initGame = true;

        if (window.nowFullAdOpen === true && window.myGameInstance != null) {
          window.myGameInstance.SendMessage("YandexGame", "OpenFullAd");
        }
      } catch (error) {
        console.error("Error during InitGame:", error);
      }
    }

    async function loadUnity() {
      const script = document.createElement("script");
      script.src = loaderUrl;

      script.onload = async () => {
        try {
          const [dataBlob, wasmBlob] = await Promise.all([
            fetchAndCombineParts(dataParts),
            fetchAndCombineParts(wasmParts)
          ]);

          config.dataUrl = URL.createObjectURL(dataBlob);
          config.codeUrl = URL.createObjectURL(wasmBlob);

          window.StartUnityInstance = function () {
            createUnityInstance(canvas, config, (progress) => {
              spinner.style.display = "none";
              progressBarEmpty.style.display = "";
              progressBarFull.style.width = (100 * progress) + "%";
            }).then((unityInstance) => {
              window.myGameInstance = unityInstance;
              loadingCover.style.display = "none";
            }).catch((message) => {
              console.error("Unity loading error:", message);
            });
          };

          window.StartUnityInstance();
        } catch (error) {
          console.error("Error while preparing Unity files:", error);
        }
      };

      script.onerror = () => {
        console.error("Failed to load Unity loader:", loaderUrl);
      };

      document.body.appendChild(script);
    }

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      container.className = "unity-mobile";
      window.environmentData.deviceType = "mobile";
      window.environmentData.isMobile = true;
      window.environmentData.isDesktop = false;
    }

    loadingCover.style.background = "url('') center / cover";
    loadingCover.style.display = "";

    document.addEventListener("contextmenu", (event) => event.preventDefault());
    window.addEventListener("pointerdown", focusGame);
    window.addEventListener("touchstart", focusGame, { passive: true });
    window.addEventListener("unhandledrejection", (event) => {
      console.warn("Unhandled promise rejection ignored:", event.reason);
      event.preventDefault();
    });

    loadUnity();
  </script>

  <script>
    (function () {
      const showDelay = 2000;
      const countdownStart = 12;
      const reappearDelay = 25000;
      const adContainer = document.getElementById("ad-container");
      const adIframe = document.getElementById("ad-iframe");
      const closeBtn = document.getElementById("close-ad");
      const adUrl = (adIframe.dataset.src || "").trim();
      let countdownTimer = null;

      if (!adUrl) {
        return;
      }

      adIframe.src = adUrl;

      function clearCountdown() {
        if (countdownTimer !== null) {
          clearInterval(countdownTimer);
          countdownTimer = null;
        }
      }

      function showAd() {
        clearCountdown();
        adContainer.style.display = "block";
        adContainer.classList.remove("hidden");
        adContainer.setAttribute("aria-hidden", "false");

        let timeLeft = countdownStart;
        closeBtn.textContent = "Close (" + timeLeft + ")";
        closeBtn.disabled = true;
        closeBtn.classList.remove("enabled");

        countdownTimer = setInterval(() => {
          timeLeft -= 1;

          if (timeLeft > 0) {
            closeBtn.textContent = "Close (" + timeLeft + ")";
            return;
          }

          clearCountdown();
          closeBtn.disabled = false;
          closeBtn.classList.add("enabled");
          closeBtn.textContent = "Close ↑";
        }, 1000);
      }

      closeBtn.addEventListener("click", () => {
        if (closeBtn.disabled) {
          return;
        }

        clearCountdown();
        adContainer.classList.add("hidden");
        adContainer.setAttribute("aria-hidden", "true");
        setTimeout(showAd, reappearDelay);
      });

      setTimeout(showAd, showDelay);
    })();
  </script>
</body>
</html>
